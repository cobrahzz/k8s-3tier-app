apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: ">=60.0.0"
      helm:
        releaseName: kube-prom-stack
        valueFiles:
          - $values/deploy/monitoring/values-kube-prometheus-stack.yaml
    - repoURL: https://github.com/cobrahzz/k8s-3tier-app.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
