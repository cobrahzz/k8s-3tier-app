apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-onsite
  namespace: webstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        topology.kubernetes.io/region: onsite
      containers:
        - name: frontend
          image: 238122922479.dkr.ecr.eu-west-3.amazonaws.com/k8sfront:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
